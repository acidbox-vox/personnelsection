<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personnel Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>PERSONNEL SYSTEM</h1>
    </header>
    
    <div id="adminTools">
        <span id="adminStatus">ADMIN MODE</span>
        <button id="logoutBtn">LOGOUT 🔓</button>
    </div>

    <div id="chart-pyramid"></div>

    <button id="adminBtn">⚙️</button>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <img id="personPhoto" src="" alt="Profile">
            <h2 id="personName"></h2>
            <p id="personPosition"></p>
            <div class="phone-container">📞 เบอร์โทรศัพท์: <span id="personPhone"></span></div>

            <div id="adminEditForm" class="edit-form">
                <label>ชื่อ - นามสกุล</label>
                <input type="text" id="inputName">
                <label>ตำแหน่ง</label>
                <input type="text" id="inputPosition">
                <label>เบอร์โทรศัพท์</label>
                <input type="text" id="inputPhone">
                <label>ลิงก์รูปภาพ (URL)</label>
                <input type="text" id="inputPhoto">
                <button class="save-btn" id="saveChangeBtn">SAVE CHANGES</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
