<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ผังองค์กรกำลังพลและสัสดี</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/orgchart/3.8.0/css/jquery.orgchart.min.css">
    
    <style>
        body {
            font-family: 'Chakra Petch', sans-serif, Arial;
            background: #f4f6f9;
            padding: 20px;
            margin: 0;
            overflow-x: auto; /* เปิด Scrollbar แนวนอนเผื่อกรณีหน้าจอแคบกว่าผัง */
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: #1f2937;
            margin: 10px 0 20px 0;
        }

        /* Container ล็อกผังนิ่งให้อยู่กึ่งกลางหน้าจอเสมอ */
        #chart-container {
            flex-grow: 1;
            border: 1px solid #e5e7eb;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            position: relative;
            padding: 40px 20px;
            display: block;
            text-align: center;
            min-width: max-content; /* บังคับผังไม่ให้เบียดเสียทรง */
        }

        /* จัดแต่งให้ตัว OrgChart แตกกิ่งสมดุลเป็นทรงปิรามิด */
        .orgchart {
            background: transparent !important;
            display: inline-block !important;
            margin: 0 auto !important;
            float: none !important;
        }

        /* หน้าตากล่องบุคคล (โหนด) */
        .orgchart .node {
            width: 155px !important;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .orgchart .node:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 12px -3px rgba(0,0,0,0.15);
        }

        /* สไตล์ปุ่มเฟืองแอดมิน */
        #adminBtn {
            position: fixed;
            right: 20px;
            bottom: 20px;
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 50%;
            font-size: 30px;
            cursor: pointer;
            background: #1f2937;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,.3);
            z-index: 9999;
            transition: all 0.3s;
        }
        #adminBtn:hover {
            transform: rotate(90deg) scale(1.1);
            background: #374151;
        }

        /* แถบแอดมินด้านบนมุมขวา */
        #adminStatusBar {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
            gap: 10px;
            align-items: center;
        }

        #adminBadge {
            background: #ef4444;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        #logoutBtn {
            background: #374151;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: background 0.2s;
        }
        #logoutBtn:hover {
            background: #1f2937;
        }

        /* สไตล์หน้าต่าง Pop-up แสดงรายละเอียด */
        .modal {
            display: none;
            position: fixed;
            z-index: 10000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,.5);
            backdrop-filter: blur(4px);
        }

        /* เอฟเฟกต์ซูมเข้าเฉพาะตัวการ์ดข้อมูลส่วนบุคคล */
        @keyframes zoomInCard {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.7);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .modal-content {
            background: white;
            width: 380px;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            animation: zoomInCard 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        #personPhoto {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #f3f4f6;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .close {
            position: absolute;
            right: 20px;
            top: 15px;
            cursor: pointer;
            font-size: 28px;
            color: #9ca3af;
            transition: color 0.2s;
        }
        .close:hover { color: #111827; }

        /* ส่วนกรอกข้อมูลแอดมิน */
        .edit-form {
            display: none;
            margin-top: 20px;
            text-align: left;
            border-top: 1px solid #e5e7eb;
            padding-top: 15px;
        }
        .edit-form label {
            font-size: 13px;
            color: #6b7280;
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .edit-form input {
            width: 100%;
            padding: 9px;
            margin-bottom: 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
        }
        .save-btn {
            width: 100%;
            background: #10b981;
            color: white;
            border: none;
            padding: 11px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: background 0.2s;
        }
        .save-btn:hover { background: #059669; }
    </style>
</head>
<body>

    <h1>ผังองค์กรกำลังพลและสายงานสัสดี</h1>
    
    <div id="adminStatusBar">
        <div id="adminBadge">🔴 โหมดแอดมิน (คลิกล่องบุคคลเพื่อแก้ไข)</div>
        <button id="logoutBtn">ออกจากระบบแอดมิน 🔓</button>
    </div>

    <div id="chart-container"></div>

    <button id="adminBtn" title="เข้าสู่ระบบแอดมิน">⚙️</button>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            
            <img id="personPhoto" src="" alt="รูปประจำตัว">
            <h2 id="personName" style="margin:5px 0; color:#111827;"></h2>
            <p id="personPosition" style="color:#4b5563; margin:5px 0; font-weight:bold; font-size:15px;"></p>
            <p style="margin: 12px 0 5px 0; font-size: 15px; color: #1f2937;">
                📞 เบอร์โทรศัพท์: <span id="personPhone" style="font-weight: bold; color: #2563eb;">-</span>
            </p>

            <div id="adminEditForm" class="edit-form">
                <label>แก้ไขชื่อ-นามสกุล:</label>
                <input type="text" id="inputName">
                
                <label>แก้ไขชื่อตำแหน่ง:</label>
                <input type="text" id="inputPosition">

                <label>แก้ไขเบอร์โทรศัพท์:</label>
                <input type="text" id="inputPhone" placeholder="เช่น 081-xxxxxxx">
                
                <label>ลิงก์ที่อยู่รูปภาพ (URL หรือโฟลเดอร์เช่น photos/name.jpg):</label>
                <input type="text" id="inputPhoto">
                
                <button class="save-btn" id="saveChangeBtn">💾 บันทึกการเปลี่ยนแปลง</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/orgchart/3.8.0/js/jquery.orgchart.min.js"></script>

    <script>
        const ADMIN_PASSWORD = "0910655667";
        let isAdmin = false;
        let selectedNodeId = null; 
        let currentChartData = null; 

        // 1. ตรวจสอบแก้ไของค์ประกอบโครงสร้าง JSON ให้แตกกิ่งตรงตามผังปิรามิดชั้นลำดับอย่างแม่นยำ
        const defaultData = {
            "id": "node_1", "name": "หัวหน้า", "title": "หัวหน้า", "phone": "-", "photo": "https://cdn-icons-png.flaticon.com/512/1869/1869679.png",
            "children": [
                {
                    "id": "node_2", "name": "รองหัวหน้า", "title": "รองหัวหน้า", "phone": "-", "photo": "https://cdn-icons-png.flaticon.com/512/1869/1869679.png",
                    "children": [
                        // ระดับชั้น: นายทหารกำลังพล 4 นาย
                        {
                            "id": "m_kp_1", "name": "นายทหารกำลังพล 1", "title": "นายทหารกำลังพล", "phone": "-", "photo": "https://cdn-icons-png.flaticon.com/512/1869/1869679.png",
                            "children": [
                                {
                                    "id": "kp_1", "name": "จนท.กำลังพล 1", "title": "จนท.กำลังพล", "phone": "-", "photo": "https://cdn-icons-png.flaticon.com/512/1869/1869679.png",
                                    "children": [
                                        {
                                            "id": "kp_n_1", "name": "จนท.กำลังพลน้อย 1", "title": "จนท.กำลังพลน้อย", "phone": "-", "photo": "https://cdn-icons-png.flaticon.com/512/1869/1869679.png",
                                            "children": [
                                                {"id": "pw_1", "name": "พนักงานราชการ 1", "title": "พนักงานราชการ", "phone": "-", "photo": "https://cdn-icons-png.flaticon.com/512/1869/1869679.png"},
                                                {"id": "pw_2", "name": "พนักงานราชการ 2", "title": "พนักงานราชการ", "phone": "-", "photo": "https://cdn-icons-png.flaticon.com/512/1869/1869679.png"}
                                            ]
                                        }
                                    ]
                                }
                            ]
                        },
                        {
                            "id": "m_kp_2", "name": "นายทหารกำลังพล 2", "title": "นายทหารกำลังพล", "phone": "-", "photo": "https://cdn-icons-png.flaticon.com/512/1869/1869679.png",
                            "children": [
                                {
                                    "id": "kp_2", "name": "จนท.กำลังพล 2", "title": "จนท.กำลังพล", "phone": "-", "photo": "https://cdn-icons-png.flaticon.com/512/1869/1869679.png",
                                    "children": [
                                        {"id": "kp_n_2", "name": "จนท.กำลังพลน้อย 2", "title": "จนท.กำลังพลน้อย", "phone": "-", "photo": "https://cdn-icons-png.flaticon.com/512/1869/1869679.png"}
                                    ]
                                }
                            ]
                        },
                        {
                            "id": "m_kp_3", "name": "นายทหารกำลังพล 3", "title": "นายทหารกำลังพล", "phone": "-", "photo": "https://cdn-icons-png.flaticon.com/512/1869/1869679.png",
                            "children": [
                                {
                                    "id": "kp_3", "name": "จนท.กำลังพล 3", "title": "จนท.กำลังพล", "phone": "-", "photo": "https://cdn-icons-png.flaticon.com/512/1869/1869679.png",
                                    "children": [
                                        {
                                            "id": "kp_n_3", "name": "จนท.กำลังพลน้อย 3", "title": "จนท.กำลังพลน้อย", "phone": "-", "photo": "https://cdn-icons-png.flaticon.com/512/1869/1869679.png",
                                            "children": [
                                                {"id": "pw_3", "name": "พนักงานราชการ 3", "title": "พนักงานราชการ", "phone": "-", "photo": "https://cdn-icons-png.flaticon.com/512/1869/1869679.png"}
                                            ]
                                        }
                                    ]
                                }
                            ]
                        },
                        {
                            "id": "m_kp_4", "name": "นายทหารกำลังพล 4", "title": "นายทหารกำลังพล", "phone": "-", "photo": "https://cdn-icons-png.flaticon.com/512/1869/1869679.png",
                            "children": [
                                {
                                    "id": "kp_4", "name": "จนท.กำลังพล 4", "title": "จนท.กำลังพล", "phone": "-", "photo": "https://cdn-icons-png.flaticon.com/512/1869/1869679.png",
                                    "children": [
                                        {
                                            "id": "kp_n_4", "name": "จนท.กำลังพลน้อย 4", "title": "จนท.กำลังพลน้อย", "phone": "-", "photo": "https://cdn-icons-png.flaticon.com/512/1869/1869679.png",
                                            "children": [
                                                {"id": "pw_4", "name": "พนักงานราชการ 4", "title": "พนักงานราชการ", "phone": "-", "photo": "https://cdn-icons-png.flaticon.com/512/1869/1869679.png"}
                                            ]
                                        }
                                    ]
                                },
                                {
                                    "id": "kp_5", "name": "จนท.กำลังพล 5", "title": "จนท.กำลังพล", "phone": "-", "photo": "https://cdn-icons-png.flaticon.com/512/1869/1869679.png",
                                    "children": [
                                        {
                                            "id": "kp_n_5", "name": "จนท.กำลังพลน้อย 5", "title": "จนท.กำลังพลน้อย", "phone": "-", "photo": "https://cdn-icons-png.flaticon.com/512/1869/1869679.png",
                                            "children": [
                                                {"id": "pw_5", "name": "พนักงานราชการ 5", "title": "พนักงานราชการ", "phone": "-", "photo": "https://cdn-icons-png.flaticon.com/512/1869/1869679.png"}
                                            ]
                                        }
                                    ]
                                }
                            ]
                        },
                        
                        // ระดับชั้น: นายทหารสัสดี 2 นาย (แยกฝั่งขวา)
                        {
                            "id": "m_ss_1", "name": "นายทหารสัสดี 1", "title": "นายทหารสัสดี", "phone": "-", "photo": "https://cdn-icons-png.flaticon.com/512/1869/1869679.png",
                            "children": [
                                // จนท.สัสดี 1 นาย อยู่ในระดับชั้นถัดลงมาเทียบเท่ากับ จนท.กำลังพลน้อย
                                {"id": "ss_1", "name": "จนท.สัสดี 1", "title": "จนท.สัสดี", "phone": "-", "photo": "https://cdn-icons-png.flaticon.com/512/1869/1869679.png"}
                            ]
                        },
                        {
                            "id": "m_ss_2", "name": "นายทหารสัสดี 2", "title": "นายทหารสัสดี", "phone": "-", "photo": "https://cdn-icons-png.flaticon.com/512/1869/1869679.png"
                        }
                    ]
                }
            ]
        };

        // 2. ฟังก์ชันเรนเดอร์ OrgChart แบบล็อกตำแหน่งนิ่งกึ่งกลาง
        function renderChart() {
            const savedData = localStorage.getItem("military_chart_db");
            currentChartData = savedData ? JSON.parse(savedData) : defaultData;

            $('#chart-container').html('');
            $('#chart-container').orgchart({
                'data': currentChartData,
                'pan': false,   
                'zoom': false,  
                'nodeContent': 'title'
            });

            if(localStorage.getItem("is_military_admin") === "true") {
                activateAdminUI();
            }
        }

        // 3. ระบบคลิกโหนดเพื่อขยายซูมเฉพาะการ์ดป๊อปอัปดีเทล (ตัวผังใหญ่นิ่งสนิท)
        $(document).on('click', '.node', function(e){
            e.stopPropagation(); 
            
            let nodeData = $(this).data('nodeData');
            selectedNodeId = nodeData.id;

            document.getElementById("personName").innerText = nodeData.name || '';
            document.getElementById("personPosition").innerText = nodeData.title || '';
            document.getElementById("personPhone").innerText = nodeData.phone || '-';
            document.getElementById("personPhoto").src = nodeData.photo || 'https://cdn-icons-png.flaticon.com/512/1869/1869679.png';

            if (isAdmin) {
                document.getElementById("adminEditForm").style.display = "block";
                document.getElementById("inputName").value = nodeData.name || '';
                document.getElementById("inputPosition").value = nodeData.title || '';
                document.getElementById("inputPhone").value = nodeData.phone || '';
                document.getElementById("inputPhoto").value = nodeData.photo || '';
            } else {
                document.getElementById("adminEditForm").style.display = "none";
            }

            document.getElementById("detailModal").style.display = "block";
        });

        function closeModal() {
            document.getElementById("detailModal").style.display = "none";
        }
        document.querySelector(".close").onclick = closeModal;
        window.onclick = function(event) {
            if (event.target == document.getElementById("detailModal")) {
                closeModal();
            }
        }

        // 4. ระบบจัดการแอดมินและการลงชื่อออก
        document.getElementById("adminBtn").addEventListener("click", () => {
            const pass = prompt("กรุณากรอกรหัสผ่านแอดมินเพื่อแก้ไขผัง:");
            if (pass === ADMIN_PASSWORD) {
                localStorage.setItem("is_military_admin", "true");
                activateAdminUI();
                alert("เข้าสู่โหมดผู้ดูแลระบบสำเร็จ! คลิกเลือกบุคคลที่ผังเพื่อทำการบันทึกข้อมูลแก้ไขได้ทันที");
            } else if (pass !== null) {
                alert("รหัสผ่านไม่ถูกต้อง!");
            }
        });

        function activateAdminUI() {
            isAdmin = true;
            document.getElementById("adminStatusBar").style.display = "flex";
            document.getElementById("adminBtn").style.display = "none"; 
        }

        document.getElementById("logoutBtn").addEventListener("click", () => {
            isAdmin = false;
            localStorage.setItem("is_military_admin", "false");
            document.getElementById("adminStatusBar").style.display = "none";
            document.getElementById("adminBtn").style.display = "block"; 
            alert("ออกจากระบบแอดมินเรียบร้อยแล้ว");
            closeModal();
        });

        // 5. ค้นหาและอัปเดตข้อมูลบุคคลเข้าโครงสร้าง JSON
        function updateNodeInJSON(targetData, idToFind, newName, newTitle, newPhone, newPhoto) {
            if (targetData.id === idToFind) {
                targetData.name = newName;
                targetData.title = newTitle;
                targetData.phone = newPhone;
                targetData.photo = newPhoto;
                return true;
            }
            if (targetData.children) {
                for (let i = 0; i < targetData.children.length; i++) {
                    let found = updateNodeInJSON(targetData.children[i], idToFind, newName, newTitle, newPhone, newPhoto);
                    if (found) return true;
                }
            }
            return false;
        }

        // 6. กดบันทึกเพื่อจัดเก็บข้อมูลแบบถาวรในคอมพิวเตอร์
        document.getElementById("saveChangeBtn").addEventListener("click", () => {
            if (!isAdmin || !selectedNodeId) return;

            const newName = document.getElementById("inputName").value;
            const newTitle = document.getElementById("inputPosition").value;
            const newPhone = document.getElementById("inputPhone").value;
            const newPhoto = document.getElementById("inputPhoto").value;

            updateNodeInJSON(currentChartData, selectedNodeId, newName, newTitle, newPhone, newPhoto);
            localStorage.setItem("military_chart_db", JSON.stringify(currentChartData));

            alert("บันทึกการแก้ไขสำเร็จ!");
            closeModal();
            renderChart(); 
        });

        document.addEventListener("DOMContentLoaded", renderChart);
    </script>
</body>
</html>
